# Veterans 1st — authenticated rider tour (BEST-EFFORT).
# Signs in with Clerk dev TEST credentials (test phone → fixed code 424242),
# then screenshots the restyled rider screens. Requires the Clerk *development*
# instance to have test mode enabled and the test phone allow-listed.
#
# Adjust TEST_PHONE / selectors to match your Clerk dev settings + any testIDs.
# Clerk dev test convention: a test phone number verifies with code 424242.
appId: com.novagen.veteransfirst
env:
  TEST_PHONE: '2015550123'
---
- launchApp:
    clearState: true
- tapOn:
    text: 'Get started'
    optional: true
- tapOn:
    text: 'Sign in'
    optional: true
# Phone entry (PhoneField). Prefer a testID if present; fall back to the field.
- tapOn:
    id: 'phone-input'
    optional: true
- inputText: ${TEST_PHONE}
- tapOn:
    text: 'Send verification code'
    optional: true
- tapOn:
    text: 'Continue'
    optional: true
# Verification code (OTPField) — Clerk dev test code.
- inputText: '424242'
- extendedWaitUntil:
    visible:
      text: 'Book a Ride'
    timeout: 15000
- takeScreenshot: rider-home
- tapOn:
    text: 'Book a Ride'
- takeScreenshot: rider-booking-where
- back
- tapOn:
    text: 'My Rides'
    optional: true
- takeScreenshot: rider-my-rides
