appId: com.novagen.veteransfirst
tags: [edge]
---
# WrongRoleScreen (apps/mobile/components/auth/WrongRoleScreen.tsx)
# Reachability: the component is rendered by the (rider), (driver), and (family) route group
# _layout.tsx files as a RoleGate fallback — it cannot be reached by deep-link alone.
#
# Strategy: sign in as the driver test user (role=driver), then navigate to the rider route
# group via deep-link. RoleGate sees role != 'rider' and renders WrongRoleScreen.
# Asserted text: "Access Restricted" (WrongRoleScreen.tsx line 29)
#
# NOTE: this flow requires a running authenticated session. The driver seed user (2015550101)
# must be allow-listed in Clerk test mode with OTP code 424242. The sign-in subflow sets
# clearState: true which guarantees a fresh session before attempting the role mismatch.
- runFlow: ../subflows/sign-in-as-driver.yaml
- openLink: 'veterans-first://(rider)'
- assertVisible:
    text: 'Access Restricted'
- takeScreenshot: wrong-role
