appId: com.novagen.veteransfirst
tags: [family]
---
- runFlow: ../subflows/sign-in-as-family.yaml
# (family)/index.tsx:122 testID=`family-linked-rider-${item.id}` — real Pressable (Link asChild)
# navigates to /rider/[id] (rider detail dashboard)
- tapOn:
    id: 'family-linked-rider-.*'
# rider/[id]/index.tsx:113 testID="family-rider-dashboard" — the ScrollView root
- assertVisible:
    id: 'family-rider-dashboard'
# rider/[id]/index.tsx:128 — "Upcoming" section heading
- assertVisible:
    text: 'Upcoming'
# rider/[id]/index.tsx:137 — "History" section heading
- assertVisible:
    text: 'History'
- takeScreenshot: family-rider-detail
