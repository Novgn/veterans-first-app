name: CI

on:
  pull_request:
    branches: [main, stage, dev]
  push:
    branches: [main, stage, dev]

env:
  # Supabase secrets for database tests
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pin to a known-good version; "latest" can change the generated local
          # keys and break the DB tests that authenticate with them.
          version: 2.40.7

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase local instance
        run: supabase start

      - name: Run tests
        run: |
          # The DB integration tests read SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY
          # and otherwise fall back to a hardcoded demo key that can mismatch the
          # running instance's keys (→ "permission denied for table users").
          # Export the actual keys from the running local instance.
          set -a
          eval "$(supabase status -o env)"
          set +a
          export SUPABASE_URL="$API_URL"
          export SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          npm run test

      - name: Run database tests
        run: supabase test db

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      # Clerk secrets required for Next.js builds (use placeholder for CI if not set)
      # Placeholder must contain "placeholder" so layout.tsx can detect CI builds
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_placeholder_ci_build' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_placeholder_ci_build' }}
      # Supabase env vars for Next.js builds (use placeholder for CI if not set)
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      # @veterans-first/shared/db eagerly constructs a postgres client at module
      # load and throws if DATABASE_URL is unset; importing it in an API route
      # (e.g. /api/notifications/reminders) breaks `next build`'s page-data
      # collection. postgres-js is lazy, so a placeholder URL is never connected.
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build
