# Mobile E2E (Maestro) — manual dispatch only.
#
# Required secrets (set in repo Settings → Secrets → Actions):
#   EXPO_TOKEN                  EAS / Expo account token (for expo run:ios auth if needed)
#   CLERK_SECRET_KEY            Clerk secret key for the development instance
#   SUPABASE_URL                Supabase project URL (https://<project>.supabase.co)
#   SUPABASE_SERVICE_ROLE_KEY   Supabase service-role key (used by e2e:seed script)
#   EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY  Clerk publishable key (passed to the native build)
#
# This workflow is intentionally NOT triggered on pull_request or push.
# Run it manually via the GitHub Actions UI or `gh workflow run e2e-mobile.yml`.

name: Mobile E2E (Maestro)

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Seed test data
        working-directory: apps/mobile
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run e2e:seed

      - name: Boot simulator and build iOS (Release)
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          xcrun simctl boot "iPhone 16 Pro" || true
          npx expo run:ios --configuration Release

      - name: Install Maestro
        run: curl -Ls https://get.maestro.mobile.dev | bash

      - name: Run Maestro flows
        working-directory: apps/mobile
        run: $HOME/.maestro/bin/maestro test .maestro

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-screenshots
          path: ~/.maestro/tests/**

      - name: Teardown test data
        if: always()
        working-directory: apps/mobile
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run e2e:seed:teardown
